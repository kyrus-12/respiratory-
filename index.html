<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respiratory System Interactive Mastery</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary: #2c3e50;
            --accent: #e74c3c;
            --success: #2ecc71;
            --btn-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        body {
            margin: 0; background: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* --- LOGIN & WAITING --- */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .login-box input { display: block; width: 90%; margin: 10px auto; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        
        #waiting-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #2c3e50; color: white; z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- QUIZ SYSTEM --- */
        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 80%; max-width: 600px; margin-top: 20px; }
        .quiz-opt { padding: 18px; background: #34495e; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1rem; }
        .selected-correct { background: var(--success) !important; transform: scale(1.05); }

        /* --- LEADERBOARD (UPPER LEFT) --- */
        #leaderboard {
            position: absolute; top: 15px; left: 15px; width: 240px;
            background: white; border-radius: 10px; padding: 12px;
            box-shadow: var(--btn-shadow); z-index: 6000; transition: 0.3s;
        }
        #leaderboard.minimized { width: 60px; height: 30px; overflow: hidden; cursor: pointer; background: var(--primary); }
        #leaderboard.minimized .rank-content, #leaderboard.minimized h3 { display: none; }
        #leaderboard.minimized::after { content: "RANK"; color: white; font-weight: 900; font-size: 12px; display: flex; justify-content: center; align-items: center; height: 100%; }
        
        .rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .rank-header h3 { margin: 0; font-size: 0.9rem; color: var(--primary); }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; font-size: 0.85rem; color: #333; }
        .group-tag { font-size: 0.7rem; color: #7f8c8d; display: block; }

        /* --- WRAPPER & UI --- */
        .wrapper {
            position: relative; width: 98vw; max-width: 1000px; aspect-ratio: 3 / 2;
            background: white; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden; display: none;
        }

        #zoom-container { position: relative; width: 100%; height: 100%; transition: transform 0.5s ease; cursor: zoom-in; }
        #zoom-container.zoomed { transform: scale(1.7); }
        .base-img { width: 100%; height: 100%; object-fit: contain; }

        .admin-controls { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; gap: 10px; }
        .trigger-btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .close-quiz-btn { background: #f39c12; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; }

        .cover-btn {
            position: absolute; background: #ffffff; border: 2px solid; border-radius: 6px;
            font-size: clamp(8px, 1.1vw, 12px); font-weight: 800; cursor: pointer; z-index: 20;
            box-shadow: var(--btn-shadow); width: 180px; height: 45px;
        }

        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            width: 85%; max-width: 400px; background: white; padding: 20px;
            border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            visibility: hidden; opacity: 0; transition: 0.3s; z-index: 3000;
        }
        .modal.active { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>AIGHAM Portal</h2>
        <input type="text" id="user-name" placeholder="Name">
        <input type="text" id="group-id" placeholder="Group (e.g., Group 6)">
        <input type="password" id="pass-id" placeholder="Password">
        <button class="trigger-btn" style="width:100%" onclick="login()">Enter System</button>
    </div>
</div>

<div id="waiting-screen">
    <h1>Student Dashboard</h1>
    <div id="p-score-board" style="font-size: 3rem; color: var(--success); font-weight: bold;">0</div>
    <p id="group-display"></p>
    <p>Waiting for the quiz to be triggered...</p>
</div>

<div id="quiz-overlay">
    <h1 style="font-size: 2rem;">QUIZ IN PROGRESS</h1>
    <h2 id="question-text">Question</h2>
    <div class="quiz-options" id="quiz-options"></div>
    <p id="quiz-status-msg" style="margin-top:20px; color:#f1c40f;">Select correct answers. Waiting for Admin to close...</p>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>

<div class="wrapper" id="main-wrapper">
    <div id="leaderboard" onclick="if(this.classList.contains('minimized')) toggleRank()">
        <div class="rank-header">
            <h3>Leaderboard</h3>
            <button onclick="event.stopPropagation(); toggleRank()" style="cursor:pointer; background:none; border:none; font-weight:bold;">–</button>
        </div>
        <div id="rank-list" class="rank-content"></div>
    </div>

    <div class="admin-controls" id="admin-ui" style="display:none;">
        <button id="start-btn" class="trigger-btn" onclick="startNewQuestion()">🚀 START QUIZ</button>
        <button id="close-btn" class="close-quiz-btn" onclick="adminCloseQuiz()">🛑 CLOSE & REVIEW</button>
    </div>

    <div id="zoom-container" onclick="toggleZoom(event)">
        <img src="https://imgur.com/5YQmThC.png" class="base-img">
        <button class="cover-btn" style="top: 18%; left: 8%; border-color: #ff4757;" onclick="showData('Nasal Cavity', 'Filters and warms air.', 'video')">Nasal Cavity</button>
        <button class="cover-btn" style="top: 61%; left: 9%; border-color: #48dbfb;" onclick="showData('Trachea', 'The windpipe.', 'video')">Trachea</button>
    </div>
</div>

<div class="modal" id="modal">
    <span style="float:right; cursor:pointer; color:red; font-weight:bold;" onclick="closeModal()">×</span>
    <h2 id="mTitle"></h2>
    <p id="mDesc"></p>
    <div id="mediaBox" style="width:100%; height:200px; background:#000;"></div>
</div>

<script>
    const socket = io();
    let currentRole = "player";
    let myUsername = "";
    let myGroup = "";
    let myScore = 0;
    let playersData = {};

    function login() {
        const name = document.getElementById('user-name').value;
        const group = document.getElementById('group-id').value;
        const pass = document.getElementById('pass-id').value;
        
        if(!name || !pass) return alert("Fill all fields");

        if(group === "") {
            if(pass !== "renz123") return alert("Wrong Admin Pass");
            currentRole = "leader";
            document.getElementById('admin-ui').style.display = 'flex';
            document.getElementById('main-wrapper').style.display = 'block';
        } else {
            currentRole = "player";
            myGroup = group;
            document.getElementById('group-display').innerText = "Joined as: " + group;
            document.getElementById('waiting-screen').style.display = 'flex';
        }
        
        myUsername = name;
        document.getElementById('login-screen').style.display = 'none';
        socket.emit('user-join', { username: name, group: group, role: currentRole });
    }

    function toggleRank() { document.getElementById('leaderboard').classList.toggle('minimized'); }

    // --- ADMIN ACTIONS ---
    function startNewQuestion() {
        const quizData = {
            question: "Which parts are essential for the Respiratory process?",
            options: ["Nasal Cavity", "Trachea", "Stomach", "Femur"],
            correctIndices: [0, 1]
        };
        socket.emit('trigger-question', quizData);
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('close-btn').style.display = 'block';
    }

    function adminCloseQuiz() {
        socket.emit('close-quiz-manual');
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('close-btn').style.display = 'none';
    }

    // --- SOCKET LISTENERS ---
    socket.on('update-leaderboard', (allPlayers) => {
        playersData = allPlayers;
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        
        const sorted = Object.values(playersData).sort((a, b) => b.score - a.score);
        sorted.forEach(p => {
            const div = document.createElement('div');
            div.className = "rank-item";
            div.innerHTML = `<div><b>${p.username}</b><span class="group-tag">${p.group || 'Leader'}</span></div> <b>${p.score}</b>`;
            list.appendChild(div);
        });
    });

    socket.on('show-quiz-overlay', (data) => {
        const overlay = document.getElementById('quiz-overlay');
        const optionsBox = document.getElementById('quiz-options');
        overlay.style.display = 'flex';
        document.getElementById('question-text').innerText = data.question;
        optionsBox.innerHTML = "";
        
        let localClicks = data.correctIndices.length;

        data.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "quiz-opt";
            btn.innerText = opt;
            btn.onclick = () => {
                if(currentRole === "leader" || localClicks <= 0) return;
                if(data.correctIndices.includes(idx)) {
                    btn.classList.add('selected-correct');
                    myScore += 10;
                    document.getElementById('p-score-board').innerText = myScore;
                    socket.emit('score-update', { username: myUsername, score: myScore, group: myGroup });
                }
                localClicks--;
                btn.disabled = true;
            };
            optionsBox.appendChild(btn);
        });
    });

    socket.on('hide-quiz-overlay', () => {
        document.getElementById('quiz-overlay').style.display = 'none';
    });

    // --- UI HELPERS ---
    function toggleZoom(e) { if(e.target.tagName !== 'BUTTON') document.getElementById('zoom-container').classList.toggle('zoomed'); }
    function showData(t, d, type) {
        event.stopPropagation();
        document.getElementById('mTitle').innerText = t;
        document.getElementById('mDesc').innerText = d;
        document.getElementById('modal').classList.add('active');
        document.getElementById('overlay').style.display = 'block';
    }
    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
    }
</script>
</body>
</html>
