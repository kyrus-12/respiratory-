<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respiratory System Interactive Mastery</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary: #2c3e50;
            --accent: #e74c3c;
            --success: #2ecc71;
            --btn-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        body {
            margin: 0; background: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* --- LOGIN --- */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .login-box input { display: block; width: 90%; margin: 10px auto; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        
        #waiting-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #2c3e50; color: white; z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- QUIZ OVERLAY --- */
        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97); z-index: 5000; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .quiz-timer { font-size: 5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 85%; max-width: 700px; margin-top: 20px; }
        .quiz-opt { padding: 20px; background: #34495e; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .quiz-opt:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct-reveal { background: var(--success) !important; box-shadow: 0 0 25px var(--success); transform: scale(1.05); font-weight: bold; }
        .wrong-reveal { background: var(--accent) !important; opacity: 0.5; }

        /* --- LEADERBOARD --- */
        #leaderboard {
            position: absolute; top: 15px; left: 15px; width: 260px;
            background: white; border-radius: 10px; padding: 12px;
            box-shadow: var(--btn-shadow); z-index: 6000; transition: 0.3s;
        }
        #leaderboard.minimized { width: 60px; height: 30px; overflow: hidden; cursor: pointer; background: var(--primary); }
        #leaderboard.minimized::after { content: "RANK"; color: white; font-weight: 900; font-size: 12px; display: flex; justify-content: center; align-items: center; height: 100%; }
        .rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 2px solid #eee; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f1f1; font-size: 0.9rem; }
        .group-name { font-weight: bold; color: var(--primary); }

        /* --- MAIN UI --- */
        .wrapper { position: relative; width: 98vw; max-width: 1000px; aspect-ratio: 3 / 2; background: white; border-radius: 15px; overflow: hidden; display: none; }
        #zoom-container { position: relative; width: 100%; height: 100%; transition: transform 0.5s ease; }
        #zoom-container.zoomed { transform: scale(1.7); }
        .base-img { width: 100%; height: 100%; object-fit: contain; }

        .admin-controls { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; gap: 10px; }
        .trigger-btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .close-quiz-btn { background: #f39c12; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; }

        .cover-btn { position: absolute; background: #ffffff; border: 2px solid; border-radius: 6px; font-size: 12px; font-weight: 800; cursor: pointer; width: 160px; height: 40px; box-shadow: var(--btn-shadow); }

        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; visibility: hidden; z-index: 3000; }
        .modal.active { visibility: visible; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>AIGHAM Portal</h2>
        <input type="text" id="user-name" placeholder="Your Name">
        <input type="text" id="group-id" placeholder="Group ID (e.g. Group 6)">
        <input type="password" id="pass-id" placeholder="Password">
        <button class="trigger-btn" style="width:100%" onclick="login()">Enter Laboratory</button>
    </div>
</div>

<div id="waiting-screen">
    <h1>Student Terminal</h1>
    <div id="p-score-board" style="font-size: 4rem; color: var(--success); font-weight: bold;">0</div>
    <p id="group-display" style="font-size: 1.2rem;"></p>
    <p>Waiting for Teacher to broadcast a question...</p>
</div>

<div id="quiz-overlay">
    <div class="quiz-timer" id="global-timer">10</div>
    <h2 id="question-text" style="text-align:center; padding: 0 20px;">Question</h2>
    <div class="quiz-options" id="quiz-options"></div>
    <p id="status-text" style="margin-top:20px; color:#f1c40f; font-weight: bold;">CHOOSE ONE ANSWER!</p>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>

<div class="wrapper" id="main-wrapper">
    <div id="leaderboard" onclick="if(this.classList.contains('minimized')) toggleRank()">
        <div class="rank-header">
            <h3>Group Rankings</h3>
            <button onclick="event.stopPropagation(); toggleRank()" style="background:none; border:none; cursor:pointer;">–</button>
        </div>
        <div id="rank-list"></div>
    </div>

    <div class="admin-controls" id="admin-ui" style="display:none;">
        <button id="start-btn" class="trigger-btn" onclick="startNewQuestion()">🚀 PUSH QUESTION</button>
        <button id="close-btn" class="close-quiz-btn" onclick="adminCloseQuiz()">🛑 CLOSE MODAL</button>
    </div>

    <div id="zoom-container" onclick="toggleZoom(event)">
        <img src="https://imgur.com/5YQmThC.png" class="base-img">
        <button class="cover-btn" style="top: 18%; left: 8%; border-color: #ff4757;" onclick="showData('Nasal Cavity', 'Filters and warms air.', 'video')">Nasal Cavity</button>
        <button class="cover-btn" style="top: 61%; left: 9%; border-color: #48dbfb;" onclick="showData('Trachea', 'The main windpipe.', 'video')">Trachea</button>
    </div>
</div>

<div class="modal" id="modal">
    <span style="float:right; cursor:pointer; color:red; font-weight:bold;" onclick="closeModal()">×</span>
    <h2 id="mTitle"></h2>
    <p id="mDesc"></p>
    <div id="mediaBox" style="width:100%; height:200px; background:#000; border-radius:10px;"></div>
</div>

<script>
    const socket = io();
    let currentRole = "player", myUsername = "", myGroup = "", myScore = 0;
    let quizActive = false, canClick = false;

    // --- QUESTION BANK ---
    const questions = [
        { q: "Which part warms and filters the air?", opts: ["Nasal Cavity", "Trachea", "Alveoli", "Esophagus"], ans: [0] },
        { q: "What is known as the 'windpipe'?", opts: ["Larynx", "Trachea", "Bronchi", "Pharynx"], ans: [1] },
        { q: "Where does gas exchange occur?", opts: ["Trachea", "Bronchi", "Alveoli", "Nose"], ans: [2] }
    ];
    let qIdx = 0;

    function login() {
        const name = document.getElementById('user-name').value;
        const group = document.getElementById('group-id').value;
        const pass = document.getElementById('pass-id').value;
        if(!name || !pass) return alert("Missing details");

        if(group === "") {
            if(pass !== "renz123") return alert("Admin Denied");
            currentRole = "leader";
            document.getElementById('admin-ui').style.display = 'flex';
            document.getElementById('main-wrapper').style.display = 'block';
        } else {
            currentRole = "player";
            myGroup = group;
            document.getElementById('group-display').innerText = "Assigned to: " + group;
            document.getElementById('waiting-screen').style.display = 'flex';
        }
        myUsername = name;
        document.getElementById('login-screen').style.display = 'none';
        socket.emit('user-join', { username: name, group: group, role: currentRole });
    }

    function toggleRank() { document.getElementById('leaderboard').classList.toggle('minimized'); }

    function startNewQuestion() {
        const data = questions[qIdx % questions.length];
        socket.emit('trigger-question', {
            question: data.q,
            options: data.opts,
            correctIndices: data.ans,
            timer: 10
        });
        qIdx++;
        document.getElementById('start-btn').disabled = true;
    }

    function adminCloseQuiz() {
        socket.emit('close-quiz-manual');
        document.getElementById('close-btn').style.display = 'none';
        document.getElementById('start-btn').disabled = false;
        document.getElementById('start-btn').style.display = 'block';
    }

    socket.on('update-leaderboard', (groups) => {
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        Object.entries(groups).sort((a,b) => b[1]-a[1]).forEach(([name, score]) => {
            if(!name || name === "null") return;
            list.innerHTML += `<div class="rank-item"><span class="group-name">${name}</span> <b>${score}</b></div>`;
        });
    });

    socket.on('show-quiz-overlay', (data) => {
        quizActive = true; canClick = true;
        const overlay = document.getElementById('quiz-overlay');
        const box = document.getElementById('quiz-options');
        overlay.style.display = 'flex';
        document.getElementById('question-text').innerText = data.question;
        document.getElementById('status-text').innerText = "CHOOSE ONE ANSWER!";
        box.innerHTML = "";
        
        let time = data.timer;
        document.getElementById('global-timer').innerText = time;

        data.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "quiz-opt";
            btn.id = "opt-" + i;
            btn.innerText = opt;
            btn.onclick = () => {
                if(!canClick || currentRole === "leader") return;
                canClick = false; // MAXIMUM ONE CLICK PER PLAYER
                if(data.correctIndices.includes(i)) {
                    myScore += 10;
                    document.getElementById('p-score-board').innerText = myScore;
                    socket.emit('score-update', { group: myGroup, score: 10 });
                    btn.style.background = "#2ecc71";
                    document.getElementById('status-text').innerText = "CORRECT!";
                } else {
                    btn.style.background = "#e74c3c";
                    document.getElementById('status-text').innerText = "WRONG!";
                }
                document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
            };
            box.appendChild(btn);
        });

        const timer = setInterval(() => {
            time--;
            document.getElementById('global-timer').innerText = time;
            if(time <= 0) {
                clearInterval(timer);
                canClick = false;
                quizActive = false;
                data.correctIndices.forEach(idx => document.getElementById("opt-"+idx).classList.add('correct-reveal'));
                document.getElementById('status-text').innerText = "TIME UP! REVIEWING...";
                if(currentRole === "leader") {
                    document.getElementById('close-btn').style.display = 'block';
                    document.getElementById('start-btn').style.display = 'none';
                }
            }
        }, 1000);
    });

    socket.on('hide-quiz-overlay', () => { document.getElementById('quiz-overlay').style.display = 'none'; });

    function toggleZoom(e) { if(e.target.tagName !== 'BUTTON') document.getElementById('zoom-container').classList.toggle('zoomed'); }
    function showData(t, d) {
        event.stopPropagation();
        document.getElementById('mTitle').innerText = t;
        document.getElementById('mDesc').innerText = d;
        document.getElementById('modal').classList.add('active');
        document.getElementById('overlay').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
</script>
</body>
</html>
