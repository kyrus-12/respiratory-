<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respiratory System Interactive Mastery</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary: #2c3e50;
            --accent: #e74c3c;
            --btn-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        body {
            margin: 0;
            background: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- UI COMPONENTS --- */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .login-box input { display: block; width: 90%; margin: 10px auto; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        
        #waiting-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #2c3e50; color: white; z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        /* --- QUESTION COUNTER --- */
        .q-counter {
            position: absolute; top: 20px; font-size: 1.5rem; font-weight: bold;
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px;
        }

        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 80%; max-width: 600px; margin-top: 20px; }
        .quiz-opt { padding: 20px; background: #34495e; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .quiz-opt:active { transform: scale(0.95); }
        .correct { background: #2ecc71 !important; }
        .hidden { display: none !important; }

        /* --- MAIN APP WRAPPER --- */
        .wrapper {
            position: relative; width: 98vw; max-width: 1000px; aspect-ratio: 3 / 2;
            background: white; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden; display: none; /* Hidden until login */
        }

        #zoom-container { position: relative; width: 100%; height: 100%; transition: transform 0.5s ease; cursor: zoom-in; }
        #zoom-container.zoomed { transform: scale(1.7); }
        .base-img { width: 100%; height: 100%; object-fit: contain; }

        .title-btn {
            position: absolute; top: 4%; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 500px; height: 60px; background: var(--primary);
            color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: 900; cursor: pointer; z-index: 30;
        }

        .cover-btn {
            position: absolute; background: white; border: 2px solid; border-radius: 6px;
            font-size: 11px; font-weight: 800; cursor: pointer; z-index: 20;
            width: 140px; height: 35px; box-shadow: var(--btn-shadow);
        }

        .tap-node {
            position: absolute; width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid white; cursor: pointer; z-index: 25;
            animation: pulse 2s infinite; transform: translate(-50%, -50%);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,0,0,0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0,0,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
        }

        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 450px; background: white; padding: 20px;
            border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            display: none; z-index: 3000;
        }
        .active-modal { display: block !important; }
        .media-box { width: 100%; height: 200px; background: #000; border-radius: 12px; margin-top: 15px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color:var(--primary)">AIGHAM Portal</h2>
        <input type="text" id="user-name" placeholder="Enter Your Name">
        <input type="text" id="group-id" placeholder="Group ID (Empty for Main)">
        <input type="password" id="pass-id" placeholder="Password">
        <button class="title-btn" style="position:static; width:100%; margin-top:10px; transform:none;" onclick="login()">Enter System</button>
    </div>
</div>

<div id="waiting-screen">
    <h1>Connect Success!</h1>
    <p>Waiting for Leader to start the session...</p>
    <div id="p-score-board" style="font-size: 2rem; margin-top: 20px;">Score: 0</div>
</div>

<div id="quiz-overlay">
    <div class="q-counter">Question #<span id="q-num">0</span></div>
    <h1 id="timer-display" style="font-size: 4rem; color:var(--accent)">10</h1>
    <h2 id="question-text" style="text-align:center; padding: 0 20px;">Ready?</h2>
    <div class="quiz-options" id="quiz-options"></div>
    <p id="winner-info" style="margin-top:30px; font-size:1.5rem; color:#2ecc71;"></p>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>

<div class="wrapper" id="main-wrapper">
    <div id="zoom-container" onclick="toggleZoom(event)">
        <img src="https://imgur.com/5YQmThC.png" class="base-img">
        <button class="title-btn" onclick="showData('Respiratory System', 'Expels CO2 and takes in O2.', 'video')">RESPIRATORY SYSTEM</button>
        
        <button class="cover-btn" style="top: 18%; left: 8%; border-color: #ff4757;" onclick="showData('Nasal Cavity', 'Filters air.', 'video')">Nasal Cavity</button>
        <button class="cover-btn" style="top: 61%; left: 9%; border-color: #48dbfb;" onclick="showData('Trachea', 'The windpipe.', 'video')">Trachea</button>
        <button class="cover-btn" style="top: 89%; right: 10%; border-color: #222f3e;" onclick="showData('Diaphragm', 'Breathing muscle.', 'video')">Diaphragm</button>
        
        <div class="tap-node" style="top: 37%; left: 42%; background: #ff4757;" onclick="showData('Nasal Point', 'Cilia filtration.', 'image')"></div>
        <div class="tap-node" style="top: 57%; left: 48%; background: #48dbfb;" onclick="showData('Trachea Tip', 'Windpipe tube.', 'video')"></div>
    </div>
</div>

<div class="modal" id="modal">
    <h2 id="mTitle">Title</h2>
    <p id="mDesc">Description</p>
    <div class="media-box" id="mediaBox"></div>
    <button onclick="closeModal()" style="margin-top:10px; width:100%; padding:10px; border-radius:8px; border:none; background:#ff4757; color:white;">Close</button>
</div>

<script>
    const socket = io();
    let currentRole = "player";
    let myUsername = "";
    let myScore = 0;
    let questionCount = 0;

    function login() {
        const name = document.getElementById('user-name').value;
        const group = document.getElementById('group-id').value;
        const pass = document.getElementById('pass-id').value;

        if(!name || !pass) return alert("Please enter Name and Password");

        // --- SECURITY CONFIG ---
        const MASTER_PASS = "renz123"; // CHANGE YOUR PASSWORD HERE

        if(group === "") {
            if(pass !== MASTER_PASS) return alert("Invalid Admin Password");
            currentRole = "leader";
            document.getElementById('main-wrapper').style.display = 'block';
        } else {
            currentRole = "player";
            document.getElementById('waiting-screen').style.display = 'flex';
        }

        myUsername = name;
        document.getElementById('login-screen').style.display = 'none';
    }

    function showData(title, desc, type) {
        if(currentRole === "leader") {
            questionCount++;
            const quizData = {
                num: questionCount,
                title: title,
                question: "Identify the part: " + title,
                options: [title, "Heart", "Stomach", "Brain"],
                correctIndex: 0
            };
            socket.emit('trigger-question', quizData);
        }

        document.getElementById('mTitle').innerText = title;
        document.getElementById('mDesc').innerText = desc;
        document.getElementById('modal').classList.add('active-modal');
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active-modal');
        document.getElementById('overlay').style.display = 'none';
    }

    function toggleZoom(e) {
        if(e.target.tagName !== 'BUTTON' && e.target.className !== 'tap-node') {
            document.getElementById('zoom-container').classList.toggle('zoomed');
        }
    }

    // --- SOCKET LOGIC ---
    socket.on('show-quiz-overlay', (data) => {
        const overlay = document.getElementById('quiz-overlay');
        const optionsBox = document.getElementById('quiz-options');
        
        overlay.style.display = 'flex';
        document.getElementById('q-num').innerText = data.num;
        document.getElementById('question-text').innerText = data.question;
        document.getElementById('winner-info').innerText = "";
        optionsBox.innerHTML = "";

        data.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "quiz-opt";
            btn.innerText = opt;
            btn.onclick = () => {
                socket.emit('submit-answer', {username: myUsername, index: idx});
                const allBtns = document.querySelectorAll('.quiz-opt');
                allBtns.forEach(b => b.disabled = true);
            };
            optionsBox.appendChild(btn);
        });

        let time = 10;
        const timer = setInterval(() => {
            time--;
            document.getElementById('timer-display').innerText = time;
            if(time <= 0) {
                clearInterval(timer);
                setTimeout(() => overlay.style.display = 'none', 2000);
            }
        }, 1000);
    });

    socket.on('reveal-results', (data) => {
        document.getElementById('winner-info').innerText = "🏆 " + data.winner + " was FASTEST!";
        if(data.winner === myUsername) {
            myScore += 10;
            if(document.getElementById('p-score-board')) {
                document.getElementById('p-score-board').innerText = "Score: " + myScore;
            }
        }
    });
</script>
</body>
</html>
