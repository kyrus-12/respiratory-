<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respiratory System Interactive Mastery</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary: #2c3e50;
            --accent: #e74c3c;
            --success: #2ecc71;
            --btn-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        body {
            margin: 0; background: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* --- UI COMPONENTS --- */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .login-box input { display: block; width: 90%; margin: 10px auto; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        
        #waiting-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #2c3e50; color: white; z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }

        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 80%; max-width: 600px; margin-top: 20px; }
        .quiz-opt { padding: 20px; background: #34495e; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .selected-correct { background: var(--success) !important; transform: scale(1.05); }

        /* --- LEADERBOARD SIDEBAR (FOR LEADER) --- */
        #leaderboard {
            position: absolute; top: 80px; right: 20px; width: 220px;
            background: white; border-radius: 12px; padding: 15px;
            box-shadow: var(--btn-shadow); z-index: 100; max-height: 60vh; overflow-y: auto;
        }
        #leaderboard h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        .rank-item:last-child { border: none; }
        .score-val { font-weight: bold; color: var(--success); }

        /* --- ADMIN CONTROLS --- */
        .admin-controls {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        .trigger-btn {
            background: var(--accent); color: white; border: none; padding: 12px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: var(--btn-shadow);
        }

        /* --- MAIN APP WRAPPER --- */
        .wrapper {
            position: relative; width: 98vw; max-width: 1000px; aspect-ratio: 3 / 2;
            background: white; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden; display: none;
        }

        #zoom-container { position: relative; width: 100%; height: 100%; transition: transform 0.5s ease; cursor: zoom-in; }
        #zoom-container.zoomed { transform: scale(1.7); }
        .base-img { width: 100%; height: 100%; object-fit: contain; }

        .title-btn {
            position: absolute; top: 4%; left: 50%; transform: translateX(-50%);
            width: 40%; height: 45px; background: var(--primary);
            color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 900;
        }

        .cover-btn {
            position: absolute; background: white; border: 2px solid; border-radius: 6px;
            font-size: 11px; font-weight: 800; width: 120px; height: 32px;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>AIGHAM Portal</h2>
        <input type="text" id="user-name" placeholder="Name">
        <input type="text" id="group-id" placeholder="Group ID (Empty for Main)">
        <input type="password" id="pass-id" placeholder="Password">
        <button class="trigger-btn" style="width:100%" onclick="login()">Login</button>
    </div>
</div>

<div id="waiting-screen">
    <h1>System Connected</h1>
    <div id="p-score-board" style="font-size: 2.5rem;">Points: 0</div>
    <p>Wait for the Leader to trigger a question...</p>
</div>

<div id="quiz-overlay">
    <h1 id="timer-display" style="font-size: 3rem;">10</h1>
    <h2 id="question-text">Select all correct parts:</h2>
    <div class="quiz-options" id="quiz-options"></div>
    <p id="instruction-text" style="margin-top:20px; color: #aaa;">Remaining Clicks: <span id="clicks-left">0</span></p>
</div>

<div class="wrapper" id="main-wrapper">
    <div class="admin-controls" id="admin-ui">
        <button class="trigger-btn" onclick="startNewQuestion()">🚀 TRIGGER QUIZ</button>
    </div>

    <div id="leaderboard">
        <h3>Ranking</h3>
        <div id="rank-list">
            <p style="color: #999; font-size: 0.8rem;">Waiting for players...</p>
        </div>
    </div>

    <div id="zoom-container">
        <img src="https://imgur.com/5YQmThC.png" class="base-img">
        <button class="title-btn">RESPIRATORY SYSTEM</button>
        
        <button class="cover-btn" style="top: 18%; left: 8%; border-color: #ff4757;">Nasal Cavity</button>
        <button class="cover-btn" style="top: 61%; left: 9%; border-color: #48dbfb;">Trachea</button>
        <button class="cover-btn" style="top: 89%; right: 10%; border-color: #222f3e;">Diaphragm</button>
    </div>
</div>

<script>
    const socket = io();
    let currentRole = "player";
    let myUsername = "";
    let myScore = 0;
    let clicksRemaining = 0;
    let playersData = {}; // Stores all player scores for the leader

    function login() {
        const name = document.getElementById('user-name').value;
        const group = document.getElementById('group-id').value;
        const pass = document.getElementById('pass-id').value;
        const MASTER_PASS = "renz123"; 

        if(!name || !pass) return alert("Fill all fields");

        if(group === "") {
            if(pass !== MASTER_PASS) return alert("Wrong Admin Password");
            currentRole = "leader";
            document.getElementById('main-wrapper').style.display = 'block';
        } else {
            currentRole = "player";
            document.getElementById('waiting-screen').style.display = 'flex';
        }
        myUsername = name;
        document.getElementById('login-screen').style.display = 'none';
        
        // Notify server of new user
        socket.emit('user-join', { username: name, role: currentRole });
    }

    function startNewQuestion() {
        const quizData = {
            question: "Identify the Respiratory System components:",
            options: ["Nasal Cavity", "Trachea", "Heart", "Stomach"],
            correctIndices: [0, 1] 
        };
        socket.emit('trigger-question', quizData);
    }

    // --- SOCKET LOGIC ---

    // Receive player score updates (Leader only)
    socket.on('update-leaderboard', (data) => {
        if(currentRole === "leader") {
            playersData[data.username] = data.score;
            renderLeaderboard();
        }
    });

    function renderLeaderboard() {
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        
        // Sort players by score
        const sorted = Object.entries(playersData).sort((a, b) => b[1] - a[1]);

        sorted.forEach(([user, score]) => {
            const div = document.createElement('div');
            div.className = "rank-item";
            div.innerHTML = `<span>${user}</span> <span class="score-val">${score} pts</span>`;
            list.appendChild(div);
        });
    }

    socket.on('show-quiz-overlay', (data) => {
        if(currentRole === "leader") return; // Leader doesn't take the quiz

        const overlay = document.getElementById('quiz-overlay');
        const optionsBox = document.getElementById('quiz-options');
        
        overlay.style.display = 'flex';
        optionsBox.innerHTML = "";
        clicksRemaining = data.correctIndices.length;
        document.getElementById('clicks-left').innerText = clicksRemaining;

        data.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "quiz-opt";
            btn.innerText = opt;
            btn.onclick = () => {
                if(clicksRemaining > 0) {
                    if(data.correctIndices.includes(idx)) {
                        btn.classList.add('selected-correct');
                        myScore += 10;
                        document.getElementById('p-score-board').innerText = "Points: " + myScore;
                        
                        // Emit score update to the leader
                        socket.emit('score-update', { username: myUsername, score: myScore });
                    }
                    
                    clicksRemaining--;
                    document.getElementById('clicks-left').innerText = clicksRemaining;
                    btn.disabled = true;

                    if(clicksRemaining === 0) {
                        const allBtns = document.querySelectorAll('.quiz-opt');
                        allBtns.forEach(b => b.disabled = true);
                    }
                }
            };
            optionsBox.appendChild(btn);
        });

        let time = 10;
        const timer = setInterval(() => {
            time--;
            document.getElementById('timer-display').innerText = time;
            if(time <= 0) {
                clearInterval(timer);
                setTimeout(() => overlay.style.display = 'none', 1000);
            }
        }, 1000);
    });
</script>
</body>
    </html>
