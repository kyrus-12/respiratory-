<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respiratory System Interactive Mastery</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary: #2c3e50;
            --accent: #e74c3c;
            --success: #2ecc71;
            --warning: #f39c12;
            --btn-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        body {
            margin: 0;
            background: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- LOGIN & WAITING --- */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .login-box input { display: block; width: 90%; margin: 10px auto; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        
        #waiting-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #2c3e50; color: white; z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- QUIZ SYSTEM --- */
        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 5000; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .quiz-close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            background: transparent;
            border: none;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 5001;
            transition: 0.3s;
            padding: 10px;
            line-height: 1;
        }
        .quiz-close-btn:hover { color: var(--accent); transform: scale(1.2); }
        .quiz-timer { font-size: 4rem; font-weight: 900; color: var(--accent); margin-bottom: 10px; }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 80%; max-width: 600px; margin-top: 20px; }
        .quiz-opt { 
            padding: 18px; 
            background: #34495e; 
            color: white; 
            border: 3px solid transparent;
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            transition: 0.3s;
            position: relative;
        }
        .quiz-opt:hover:not(:disabled) { background: #4a6278; transform: translateY(-2px); }
        .quiz-opt.selected { 
            border-color: #f1c40f; 
            background: #2c3e50;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
        }
        .quiz-opt.correct-reveal { background: var(--success) !important; box-shadow: 0 0 20px var(--success); }
        .quiz-opt.wrong-reveal { background: #e74c3c !important; }
        .quiz-opt:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .submit-btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover:not(:disabled) { background: #27ae60; transform: scale(1.05); }
        .submit-btn:disabled { background: #7f8c8d; cursor: not-allowed; }

        /* --- LEADERBOARD --- */
        #leaderboard {
            position: absolute; top: 15px; left: 15px; width: 260px;
            background: white; border-radius: 10px; padding: 12px;
            box-shadow: var(--btn-shadow); z-index: 6000; transition: 0.3s;
        }
        #leaderboard.minimized { width: 60px; height: 30px; overflow: hidden; cursor: pointer; background: var(--primary); }
        #leaderboard.minimized .rank-content, #leaderboard.minimized h3 { display: none; }
        #leaderboard.minimized::after { content: "RANK"; color: white; font-weight: 900; font-size: 12px; display: flex; justify-content: center; align-items: center; height: 100%; }
        
        .rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .rank-header h3 { margin: 0; font-size: 0.9rem; color: var(--primary); }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; color: #333; }
        .group-pill { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; color: #666; font-weight: bold; }

        /* --- MAIN WRAPPER --- */
        .wrapper {
            position: relative;
            width: 98vw;
            max-width: 1000px;
            aspect-ratio: 3 / 2;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            display: none;
        }

        #zoom-container {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease;
            cursor: zoom-in;
        }

        #zoom-container.zoomed { transform: scale(1.7); }

        .base-img { width: 100%; height: 100%; object-fit: contain; }

        /* BOX BUTTONS */
        .cover-btn {
            position: absolute;
            background: #ffffff; 
            border: 2px solid;
            border-radius: 6px;
            font-size: clamp(8px, 1.1vw, 12px);
            font-weight: 800;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: var(--btn-shadow);
            transition: 0.2s;
            width: 200px; 
            height: 50px;
        }

        .title-btn {
            position: absolute;
            top: 4%;
            left: 50%;
            transform: translateX(-50%);
            transform-origin:center;
            width: 500px;
            height: 70px;
            background: #2c3e50;
            color: white;
            border: 3px solid #34495e;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            z-index: 30;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
  
        .cover-btn:hover, .title-btn:hover { filter: brightness(0.95); }

        /* CIRCLE NODES */
        .tap-node {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            z-index: 25;
            animation: pulse 2s infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,0,0,0.4); }
            70% { box-shadow: 0 0 0 12px rgba(0,0,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
        }

        /* ADMIN CONTROLS */
        .admin-controls { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            z-index: 100; 
            display: flex; 
            flex-direction: column;
            gap: 10px; 
            max-height: 80vh;
            overflow-y: auto;
        }
        .trigger-btn { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: var(--btn-shadow);
            white-space: nowrap;
        }
        .question-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--btn-shadow);
            font-size: 0.9rem;
            text-align: left;
        }
        .question-btn:hover { background: #2980b9; }
        .close-quiz-btn { 
            background: var(--warning); 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            display: none;
        }

        /* POPUP MODAL */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 85%; max-width: 450px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            visibility: hidden; opacity: 0;
            transition: 0.3s; z-index: 3000;
        }
        .modal.active { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .media-box { width: 100%; height: 220px; background: #000; border-radius: 12px; margin-top: 15px; overflow: hidden; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; }
        .close-btn { float: right; font-size: 30px; cursor: pointer; color: #ff4757; font-weight: bold; }

        /* QUESTION BUILDER MODAL */
        .builder-input { 
            display: block; 
            width: 90%; 
            margin: 10px auto; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 1rem;
        }
        .option-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 5px 0;
        }
        .option-row input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
        .correct-checkbox { width: 20px; height: 20px; cursor: pointer; }
        .add-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- INFO MODAL -->

<!-- QUESTION BUILDER MODAL -->
<div class="modal" id="builder-modal" style="max-width: 600px;">
    <span class="close-btn" onclick="closeBuilder()">×</span>
    <h2>Create Question</h2>
    <input type="text" id="builder-question" class="builder-input" placeholder="Enter question text...">
    <input type="number" id="builder-timer" class="builder-input" placeholder="Timer in seconds (default: 30)" value="30">
    <div id="builder-options"></div>
    <button class="add-btn" onclick="addOptionRow()">+ Add Option</button>
    <button class="trigger-btn" style="width:100%; margin-top:15px;" onclick="saveQuestion()">💾 SAVE QUESTION</button>
</div>

<script>
    const socket = io();
    let currentRole = "player";
    let myUsername = "";
    let myGroup = "";
    let myScore = 0;
    let quizActive = false;
    let currentCountdown = null;
    let hasSubmitted = false;
    let selectedAnswers = [];
    let currentQuestion = null;
    let questions = []; // Store all questions

    function login() {
        const name = document.getElementById('user-name').value;
        const group = document.getElementById('group-id').value;
        const pass = document.getElementById('pass-id').value;
        
        if(!name || !pass) return alert("Please fill Name and Password");

        if(group.trim() === "") {
            if(pass !== "renz123") return alert("Admin Password Incorrect");
            currentRole = "leader";
            document.getElementById('admin-ui').style.display = 'flex';
            document.getElementById('main-wrapper').style.display = 'block';
        } else {
            currentRole = "player";
            myGroup = group;
            document.getElementById('group-display').innerText = "GROUP: " + group;
            document.getElementById('waiting-screen').style.display = 'flex';
        }
        
        myUsername = name;
        document.getElementById('login-screen').style.display = 'none';
        socket.emit('user-join', { username: name, group: group, role: currentRole });
    }

    function toggleRank() { document.getElementById('leaderboard').classList.toggle('minimized'); }

    // --- QUESTION BUILDER ---
    function openQuestionBuilder() {
        document.getElementById('builder-modal').classList.add('active');
        document.getElementById('overlay').style.display = 'block';
        // Add 4 default options
        document.getElementById('builder-options').innerHTML = '';
        for(let i=0; i<4; i++) addOptionRow();
    }

    function closeBuilder() {
        document.getElementById('builder-modal').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
    }

    function addOptionRow() {
        const container = document.getElementById('builder-options');
        const row = document.createElement('div');
        row.className = 'option-row';
        row.innerHTML = `
            <input type="text" placeholder="Option text..." class="opt-text">
            <input type="checkbox" class="correct-checkbox" title="Mark as correct">
            <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
        `;
        container.appendChild(row);
    }

    function saveQuestion() {
        const questionText = document.getElementById('builder-question').value;
        const timer = parseInt(document.getElementById('builder-timer').value) || 30;
        
        if(!questionText) return alert("Please enter a question!");
        
        const options = [];
        const correctIndices = [];
        
        document.querySelectorAll('#builder-options .option-row').forEach((row, index) => {
            const text = row.querySelector('.opt-text').value;
            const isCorrect = row.querySelector('.correct-checkbox').checked;
            if(text) {
                options.push(text);
                if(isCorrect) correctIndices.push(index);
            }
        });
        
        if(options.length < 2) return alert("Please add at least 2 options!");
        if(correctIndices.length === 0) return alert("Please mark at least one correct answer!");
        
        const questionData = {
            id: Date.now(),
            question: questionText,
            options: options,
            correctIndices: correctIndices,
            timer: timer
        };
        
        questions.push(questionData);
        updateQuestionsList();
        closeBuilder();
        
        // Clear builder
        document.getElementById('builder-question').value = '';
        document.getElementById('builder-options').innerHTML = '';
        for(let i=0; i<4; i++) addOptionRow();
    }

    function updateQuestionsList() {
        const container = document.getElementById('questions-list');
        container.innerHTML = '';
        questions.forEach((q, idx) => {
            const btn = document.createElement('button');
            btn.className = 'question-btn';
            btn.innerHTML = `Q${idx+1}: ${q.question.substring(0, 30)}...`;
            btn.onclick = () => startQuestion(q);
            container.appendChild(btn);
        });
    }

    // --- QUIZ LOGIC ---
    function startQuestion(data) {
        socket.emit('trigger-question', data);
    }

    function adminCloseQuiz() {
        socket.emit('close-quiz-manual');
        resetQuizUI();
    }

    function resetQuizUI() {
        document.getElementById('close-btn').style.display = 'none';
        hasSubmitted = false;
        selectedAnswers = [];
    }

    function closeQuizOverlay() {
        if(currentCountdown) {
            clearInterval(currentCountdown);
            currentCountdown = null;
        }
        document.getElementById('quiz-overlay').style.display = 'none';
        quizActive = false;
        hasSubmitted = false;
        selectedAnswers = [];
        document.getElementById('status-text').style.color = "#f1c40f";
        document.getElementById('status-text').innerText = "Select all correct answers!";
    }

    function submitAnswer() {
        if(hasSubmitted || !quizActive) return;
        
        hasSubmitted = true;
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerText = "SUBMITTED!";
        
        // Check if all selected answers are correct and no correct answers missed
        const allCorrectSelected = currentQuestion.correctIndices.every(idx => selectedAnswers.includes(idx));
        const noWrongSelected = selectedAnswers.every(idx => currentQuestion.correctIndices.includes(idx));
        const isCorrect = allCorrectSelected && noWrongSelected && selectedAnswers.length > 0;
        
        if(isCorrect) {
            myScore += 10;
            document.getElementById('p-score-board').innerText = myScore;
            socket.emit('score-update', { 
                username: myUsername,
                group: myGroup, 
                score: myScore,
                pointsAdded: 10 
            });
            document.getElementById('status-text').innerText = "Correct! +10 points!";
            document.getElementById('status-text').style.color = "#2ecc71";
        } else {
            document.getElementById('status-text').innerText = "Incorrect answer(s)!";
            document.getElementById('status-text').style.color = "#e74c3c";
        }
        
        // Disable all options
        document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
        
        // Highlight correct answers
        currentQuestion.correctIndices.forEach(idx => {
            const btn = document.getElementById("opt-" + idx);
            if(btn) btn.classList.add('correct-reveal');
        });
        
        // Highlight wrong selections
        selectedAnswers.forEach(idx => {
            if(!currentQuestion.correctIndices.includes(idx)) {
                const btn = document.getElementById("opt-" + idx);
                if(btn) btn.classList.add('wrong-reveal');
            }
        });
    }

    function selectOption(index) {
        if(hasSubmitted || !quizActive) return;
        
        const btn = document.getElementById("opt-" + index);
        
        if(selectedAnswers.includes(index)) {
            selectedAnswers = selectedAnswers.filter(i => i !== index);
            btn.classList.remove('selected');
        } else {
            selectedAnswers.push(index);
            btn.classList.add('selected');
        }
        
        // Enable submit button only if at least one selected
        document.getElementById('submit-btn').disabled = selectedAnswers.length === 0;
    }

    // --- SOCKETS ---
    socket.on('update-leaderboard', (allGroups) => {
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        const sortedGroups = Object.entries(allGroups).sort((a, b) => b[1] - a[1]);
        sortedGroups.forEach(([groupName, score]) => {
            if(!groupName || groupName === "undefined") return;
            const div = document.createElement('div');
            div.className = "rank-item";
            div.innerHTML = `<span><b>${groupName}</b></span> <span class="group-pill">${score} PTS</span>`;
            list.appendChild(div);
        });
    });

    socket.on('show-quiz-overlay', (data) => {
        quizActive = true;
        hasSubmitted = false;
        selectedAnswers = [];
        currentQuestion = data;
        
        const overlay = document.getElementById('quiz-overlay');
        const optionsBox = document.getElementById('quiz-options');
        const timerEl = document.getElementById('global-timer');
        
        overlay.style.display = 'flex';
        document.getElementById('question-text').innerText = data.question;
        document.getElementById('status-text').innerText = "Select all correct answers!";
        document.getElementById('status-text').style.color = "#f1c40f";
        optionsBox.innerHTML = "";
        document.getElementById('submit-btn').innerText = "SUBMIT ANSWER";
        document.getElementById('submit-btn').disabled = true;
        
        let timeLeft = data.timer;
        timerEl.innerText = timeLeft;

        // Create buttons
        data.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "quiz-opt";
            btn.innerText = opt;
            btn.id = "opt-" + idx;
            btn.onclick = () => selectOption(idx);
            optionsBox.appendChild(btn);
        });

        // Timer Logic
        currentCountdown = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(currentCountdown);
                currentCountdown = null;
                quizActive = false;
                
                if(!hasSubmitted) {
                    submitAnswer(); // Auto-submit on timeout
                }
                
                document.getElementById('status-text').innerText = "TIME UP! Closing in 3 seconds...";
                document.getElementById('status-text').style.color = "#f39c12";
                
                if(currentRole === "player") {
                    setTimeout(() => closeQuizOverlay(), 3000);
                }
                
                if(currentRole === "leader") {
                    document.getElementById('close-btn').style.display = 'block';
                }
            }
        }, 1000);
    });

    socket.on('hide-quiz-overlay', () => {
        closeQuizOverlay();
    });

    // --- UI HELPERS ---
    function toggleZoom(e) {
        if(e.target.tagName !== 'BUTTON' && !e.target.classList.contains('tap-node')) {
            document.getElementById('zoom-container').classList.toggle('zoomed');
        }
    }

    function showData(title, desc, type) {
        event.stopPropagation();
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mDesc').innerText = desc;
        const mediaBox = document.getElementById('mediaBox');
        
        if(type === 'video') {
            mediaBox.innerHTML = '<iframe width="100%" height="100%" src="https://www.youtube.com/embed/mOKmjYwfDGU" frameborder="0" allowfullscreen></iframe>';
        } else if(type === 'image') {
            mediaBox.innerHTML = '<img src="https://picsum.photos/seed/' + title + '/400/300" style="width:100%; height:100%; object-fit:cover;">';
        } else {
            mediaBox.innerHTML = '<div style="padding:20px; color:white; text-align:center;">Information for ' + title + ' is being displayed.</div>';
        }

        document.getElementById('modal').classList.add('active');
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
    }

    // --- CLEANUP ON EXIT ---
    window.addEventListener('beforeunload', () => {
        socket.emit('user-leave', { username: myUsername, group: myGroup });
    });
</script>
</body>
</html>
