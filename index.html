<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respiratory System Interactive Mastery</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary: #2c3e50;
            --accent: #e74c3c;
            --success: #2ecc71;
            --btn-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        body {
            margin: 0; background: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* --- LOGIN & WAITING --- */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .login-box input { display: block; width: 90%; margin: 10px auto; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        
        #waiting-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #2c3e50; color: white; z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        /* --- QUIZ SYSTEM --- */
        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 5000; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .quiz-close-btn {
            position: absolute; top: 20px; right: 30px;
            background: transparent; border: none; color: white;
            font-size: 2.5rem; cursor: pointer; z-index: 5001; transition: 0.3s;
            display: none;
        }
        .quiz-timer { font-size: 4rem; font-weight: 900; color: var(--accent); margin-bottom: 10px; }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 80%; max-width: 600px; margin-top: 20px; }
        .quiz-opt { 
            padding: 18px; background: #34495e; color: white; border: none; 
            border-radius: 12px; cursor: pointer; font-size: 1.1rem; 
            transition: 0.3s; position: relative; overflow: hidden;
        }
        
        .player-selected { background: #3498db !important; box-shadow: 0 0 15px #3498db; }
        .correct-answer { background: var(--success) !important; box-shadow: 0 0 20px var(--success); transform: scale(1.05); z-index: 2; }
        
        .quiz-opt:hover:not(:disabled) { background: #4a6278; transform: translateY(-2px); }
        .quiz-opt:disabled { cursor: not-allowed; opacity: 1; color: white; }

        /* --- LEADERBOARD --- */
        #leaderboard {
            position: absolute; top: 15px; left: 15px; width: 260px;
            background: white; border-radius: 10px; padding: 12px;
            box-shadow: var(--btn-shadow); z-index: 6000; transition: 0.3s;
            display: none;
        }
        #leaderboard.minimized { width: 60px; height: 30px; overflow: hidden; cursor: pointer; background: var(--primary); }
        #leaderboard.minimized .rank-content, #leaderboard.minimized h3 { display: none; }
        .rank-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; color: #333; }
        .group-pill { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }

        .wrapper {
            position: relative; width: 98vw; max-width: 1000px; aspect-ratio: 3 / 2;
            background: white; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden; display: none;
        }
        #zoom-container { position: relative; width: 100%; height: 100%; transition: transform 0.5s ease; cursor: zoom-in; }
        #zoom-container.zoomed { transform: scale(1.7); }
        .base-img { width: 100%; height: 100%; object-fit: contain; }
        .admin-controls { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; gap: 10px; }
        .trigger-btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .close-quiz-btn { background: #f39c12; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; }
        .cover-btn { position: absolute; background: #ffffff; border: 2px solid; border-radius: 6px; font-weight: 800; cursor: pointer; width: 180px; height: 45px; z-index: 10; }

        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            width: 85%; max-width: 400px; background: white; padding: 20px; border-radius: 20px;
            visibility: hidden; opacity: 0; transition: 0.3s; z-index: 3000;
        }
        .modal.active { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; }
        
        #yt-player { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }
        
        .click-counter {
            position: absolute; top: 80px; right: 30px;
            background: rgba(255,255,255,0.1); padding: 10px 20px;
            border-radius: 10px; font-size: 1.2rem;
        }
        .group-indicator {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px;
            font-size: 0.9rem; color: #ecf0f1;
        }
    </style>
</head>
<body id="main-body">

<div id="yt-player"></div>

<div id="login-screen">
    <div class="login-box">
        <h2>AIGHAM Portal</h2>
        <input type="text" id="user-name" placeholder="Full Name">
        <input type="text" id="group-id" placeholder="Group Name (Blank for Admin)">
        <input type="password" id="pass-id" placeholder="Password">
        <button class="trigger-btn" style="width:100%" onclick="login()">Connect</button>
    </div>
</div>

<div id="waiting-screen">
    <h1>Student Dashboard</h1>
    <div id="p-score-board" style="font-size: 4rem; color: var(--success); font-weight: bold;">0</div>
    <p id="group-display" style="font-weight:bold; color:#ecf0f1;"></p>
    <p>🛡️ Secure Fullscreen Mode Active</p>
    <div class="group-indicator" id="group-members-count">Waiting for group members...</div>
</div>

<div id="quiz-overlay">
    <button id="leader-close-x" class="quiz-close-btn" onclick="closeQuizOverlay()">×</button>
    <div class="click-counter" id="clicks-remaining">Selections: 0/0</div>
    <div class="quiz-timer" id="global-timer">120</div>
    <h2 id="question-text" style="text-align:center;">Question</h2>
    <div class="quiz-options" id="quiz-options"></div>
    <p id="status-text" style="margin-top:20px; color:#f1c40f;">Select carefully!</p>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>

<div class="wrapper" id="main-wrapper">
    <div id="leaderboard" onclick="if(this.classList.contains('minimized')) toggleRank()">
        <div class="rank-header">
            <h3>Rankings</h3>
            <button onclick="event.stopPropagation(); toggleRank()" style="cursor:pointer; background:none; border:none; font-weight:bold;">–</button>
        </div>
        <div id="rank-list" class="rank-content"></div>
    </div>

    <div class="admin-controls" id="admin-ui" style="display:none;">
        <button id="start-btn" class="trigger-btn" onclick="startNewQuestion()">🚀 START NEXT QUESTION</button>
        <button id="close-btn" class="close-quiz-btn" onclick="adminCloseQuiz()">🛑 CLOSE MODAL</button>
    </div>

    <div id="zoom-container" onclick="toggleZoom(event)">
        <img src="https://imgur.com/5YQmThC.png" class="base-img">
        <button class="cover-btn" style="top: 18%; left: 8%; border-color: #ff4757;" onclick="showData(event, 'Nasal Cavity', 'Filters, warms, and moistens air.')">Nasal Cavity</button>
        <button class="cover-btn" style="top: 61%; left: 9%; border-color: #48dbfb;" onclick="showData(event, 'Trachea', 'The tube connecting throat to lungs.')">Trachea</button>
    </div>
</div>

<div class="modal" id="modal">
    <span style="float:right; cursor:pointer; color:red; font-size: 1.5rem;" onclick="closeModal()">×</span>
    <h2 id="mTitle"></h2>
    <p id="mDesc"></p>
</div>



[Image of the human respiratory system]


<script>
    const socket = io();
    let currentRole = "player";
    let myUsername = "";
    let myGroup = "";
    let myScore = 0;
    let quizActive = false;
    let currentCountdown = null;
    let currentQuestionIndex = 0;
    let currentQuestionData = null;
    let hasSubmitted = false;
    let groupSelections = [];

    // --- ENHANCED FULLSCREEN LOCK ---
    function enterFullScreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    }

    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && currentRole === "player" && myUsername !== "") {
            // Immediate re-entry attempt
            enterFullScreen();
            // Fallback alert to force interaction
            setTimeout(() => {
                if(!document.fullscreenElement) alert("SECURITY: Fullscreen is required to continue!");
            }, 500);
        }
    });

    // Keys: F to enter, E to exit
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'f') enterFullScreen();
        if (e.key.toLowerCase() === 'e' && currentRole === "leader") document.exitFullscreen();
    });

    // --- MUSIC SYSTEM ---
    let player;
    const playlist = ["UaRrDZWhtWA", "9p67S66SshQ", "t6osTfAsv9Y"]; 
    
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0', width: '0', videoId: playlist[0],
            playerVars: { 'autoplay': 0, 'controls': 0 },
            events: { 'onReady': () => console.log("Audio Ready") }
        });
    }

    function playRandomMusic() {
        if(player && player.loadVideoById) {
            const randomID = playlist[Math.floor(Math.random() * playlist.length)];
            player.loadVideoById(randomID);
            player.playVideo();
        }
    }
    function stopMusic() { if(player && player.stopVideo) player.stopVideo(); }

    // --- LOGIN ---
    function login() {
        const name = document.getElementById('user-name').value;
        const group = document.getElementById('group-id').value;
        const pass = document.getElementById('pass-id').value;
        if(!name || !pass) return alert("Fill Name and Password");

        enterFullScreen();

        if(group.trim() === "") {
            if(pass !== "renz123") return alert("Admin Password Incorrect");
            currentRole = "leader";
            document.getElementById('admin-ui').style.display = 'flex';
            document.getElementById('leaderboard').style.display = 'block';
            document.getElementById('leader-close-x').style.display = 'block';
        } else {
            currentRole = "player";
            myGroup = group;
            document.getElementById('group-display').innerText = "GROUP: " + group;
            document.getElementById('waiting-screen').style.display = 'flex';
        }
        myUsername = name;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-wrapper').style.display = 'block';
        socket.emit('user-join', { username: name, group: group, role: currentRole });
    }

    function toggleZoom(e) { if(e.target.classList.contains('base-img')) document.getElementById('zoom-container').classList.toggle('zoomed'); }
    function showData(e, title, desc) {
        if(e) e.stopPropagation(); 
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mDesc').innerText = desc;
        document.getElementById('modal').classList.add('active');
        document.getElementById('overlay').style.display = 'block';
    }
    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
    }

    // --- QUIZ LOGIC ---
    const allQuizData = [
        { question: "Which are parts of the Upper Respiratory Tract?", options: ["Nasal Cavity", "Pharynx", "Trachea", "Alveoli"], correctIndices: [0, 1], timer: 120 },
        { question: "Identify the main muscles used in breathing:", options: ["Diaphragm", "Biceps", "Intercostals", "Heart"], correctIndices: [0, 2], timer: 120 }
    ];

    function startNewQuestion() {
        if (currentQuestionIndex < allQuizData.length) {
            socket.emit('trigger-question', allQuizData[currentQuestionIndex]);
            document.getElementById('start-btn').disabled = true;
            document.getElementById('start-btn').innerText = "IN PROGRESS...";
            currentQuestionIndex++; 
        } else {
            alert("Quiz Over.");
            currentQuestionIndex = 0;
            resetQuizUI();
        }
    }

    function adminCloseQuiz() {
        socket.emit('close-quiz-manual');
        resetQuizUI();
    }

    function resetQuizUI() {
        document.getElementById('close-btn').style.display = 'none';
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('start-btn').disabled = false;
        document.getElementById('start-btn').innerText = "🚀 START NEXT QUESTION";
        closeQuizOverlay();
    }

    function closeQuizOverlay() {
        if(currentCountdown) clearInterval(currentCountdown);
        document.getElementById('quiz-overlay').style.display = 'none';
        quizActive = false;
        stopMusic();
    }

    socket.on('show-quiz-overlay', (data) => {
        quizActive = true;
        hasSubmitted = false;
        groupSelections = [];
        
        let items = data.options.map((opt, i) => ({ text: opt, originalIdx: i }));
        for (let i = items.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [items[i], items[j]] = [items[j], items[i]];
        }
        const newCorrectIndices = [];
        items.forEach((item, newIdx) => {
            if (data.correctIndices.includes(item.originalIdx)) newCorrectIndices.push(newIdx);
        });
        currentQuestionData = { ...data, options: items.map(i => i.text), correctIndices: newCorrectIndices };

        playRandomMusic();
        document.getElementById('quiz-overlay').style.display = 'flex';
        document.getElementById('question-text').innerText = data.question;
        document.getElementById('status-text').innerText = "Pick the correct answers!";
        document.getElementById('clicks-remaining').innerText = `Selections: 0/${data.correctIndices.length}`;
        
        const optionsBox = document.getElementById('quiz-options');
        optionsBox.innerHTML = "";
        currentQuestionData.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "quiz-opt";
            btn.innerText = opt;
            btn.id = "opt-" + idx;
            btn.onclick = () => {
                if(!quizActive || currentRole === "leader" || btn.disabled) return;
                socket.emit('group-selection-attempt', {
                    group: myGroup,
                    optionIndex: idx,
                    maxClicks: data.correctIndices.length
                });
            };
            optionsBox.appendChild(btn);
        });

        let timeLeft = data.timer;
        document.getElementById('global-timer').innerText = timeLeft;
        currentCountdown = setInterval(() => {
            timeLeft--;
            document.getElementById('global-timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(currentCountdown);
                handleTimeUp();
            }
        }, 1000);
    });

    socket.on('group-selection-update', (data) => {
        const btn = document.getElementById("opt-" + data.optionIndex);
        if(btn) {
            btn.disabled = true;
            btn.classList.add('player-selected');
        }
        groupSelections = data.selectionsSoFar;
        document.getElementById('clicks-remaining').innerText = `Selections: ${groupSelections.length}/${data.maxClicks}`;
        
        // --- GLOBAL SYNC FAST FORWARD ---
        if(groupSelections.length >= data.maxClicks) {
            // Tell everyone to stop the timer now
            socket.emit('force-finish-timer');
        }
    });

    // This receiver ensures everyone's screen stops at the same time
    socket.on('global-force-finish', () => {
        if(currentCountdown) clearInterval(currentCountdown);
        handleTimeUp();
    });

    function submitPoints() {
        hasSubmitted = true;
        let correctCount = groupSelections.filter(idx => currentQuestionData.correctIndices.includes(idx)).length;
        myScore += (correctCount * 10);
        document.getElementById('p-score-board').innerText = myScore;
        socket.emit('score-update', { group: myGroup, score: myScore });
    }

    function handleTimeUp() {
        if(!quizActive) return; // Prevent double trigger
        quizActive = false;
        stopMusic();
        currentQuestionData.correctIndices.forEach(idx => {
            const btn = document.getElementById("opt-" + idx);
            if(btn) btn.classList.add('correct-answer');
        });
        document.getElementById('status-text').innerText = "Checking Answers...";
        if(currentRole === "player") {
            if(!hasSubmitted) submitPoints();
            setTimeout(closeQuizOverlay, 4000);
        } else {
            document.getElementById('close-btn').style.display = 'block';
        }
    }

    socket.on('update-leaderboard', (leaderboard) => {
        if(currentRole !== "leader") return;
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        Object.entries(leaderboard).sort((a,b) => b[1]-a[1]).forEach(([name, score]) => {
            const div = document.createElement('div');
            div.className = "rank-item";
            div.innerHTML = `<span><b>${name}</b></span> <span class="group-pill">${score} PTS</span>`;
            list.appendChild(div);
        });
    });

    socket.on('hide-quiz-overlay', closeQuizOverlay);
    socket.on('group-members-update', (count) => {
        const el = document.getElementById('group-members-count');
        if(el) el.innerText = `Group Members Online: ${count}`;
    });

    function toggleRank() { document.getElementById('leaderboard').classList.toggle('minimized'); }
    window.addEventListener('beforeunload', () => socket.emit('user-leave', { username: myUsername, group: myGroup }));
</script>
</body>
</html>
